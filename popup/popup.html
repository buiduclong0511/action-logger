<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Action Logger</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #0d0f14;
      --surface: #161922;
      --surface2: #1e2330;
      --border: #2a3040;
      --accent: #4ade80;
      --accent-dim: rgba(74, 222, 128, 0.15);
      --danger: #f87171;
      --danger-dim: rgba(248, 113, 113, 0.15);
      --warning: #fbbf24;
      --muted: #4a5568;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --user-color: #60a5fa;
      --auto-color: #a78bfa;
      --system-color: #94a3b8;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 480px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    .logo-dot.stopped {
      background: var(--muted);
      box-shadow: none;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--border); }

    .btn-record {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .btn-record:hover { background: rgba(74,222,128,0.25); }

    .btn-stop {
      border-color: var(--danger);
      background: var(--danger-dim);
      color: var(--danger);
    }
    .btn-stop:hover { background: rgba(248,113,113,0.25); }

    .btn-clear {
      color: var(--text-dim);
    }

    .btn-copy {
      color: var(--warning);
      border-color: rgba(251,191,36,0.3);
      background: rgba(251,191,36,0.08);
    }
    .btn-copy:hover { background: rgba(251,191,36,0.15); }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .stat-value { font-weight: 600; color: var(--text); }
    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-family: var(--sans);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-chip:hover { color: var(--text); border-color: var(--text-dim); }
    .filter-chip.active {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border);
    }
    .filter-chip.chip-user.active { color: var(--user-color); border-color: var(--user-color); background: rgba(96,165,250,0.1); }
    .filter-chip.chip-auto.active { color: var(--auto-color); border-color: var(--auto-color); background: rgba(167,139,250,0.1); }

    /* ── Actions list ── */
    .actions-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .actions-container::-webkit-scrollbar { width: 4px; }
    .actions-container::-webkit-scrollbar-track { background: transparent; }
    .actions-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 8px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 32px; opacity: 0.4; }

    /* ── Action item ── */
    .action-item {
      margin-bottom: 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .action-item:hover { border-color: var(--text-dim); }

    .action-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      cursor: pointer;
      user-select: none;
    }

    .action-type-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .badge-click    { background: rgba(96,165,250,0.15);  color: #60a5fa; }
    .badge-input    { background: rgba(74,222,128,0.15);  color: #4ade80; }
    .badge-keydown  { background: rgba(251,191,36,0.15);  color: #fbbf24; }
    .badge-scroll   { background: rgba(148,163,184,0.1);  color: #94a3b8; }
    .badge-dom_mutation { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .badge-navigate { background: rgba(251,146,60,0.15);  color: #fb923c; }
    .badge-console  { background: rgba(244,114,182,0.15); color: #f472b6; }
    .badge-recording_started { background: rgba(74,222,128,0.1); color: #4ade80; }

    /* Console method sub-badges */
    .console-method {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: var(--mono);
      font-weight: 600;
    }
    .method-log   { background: rgba(148,163,184,0.15); color: #94a3b8; }
    .method-warn  { background: rgba(251,191,36,0.15);  color: #fbbf24; }
    .method-error { background: rgba(248,113,113,0.15); color: #f87171; }
    .method-info  { background: rgba(96,165,250,0.15);  color: #60a5fa; }
    .method-debug { background: rgba(167,139,250,0.15); color: #a78bfa; }

    .trigger-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .trigger-user    { background: rgba(96,165,250,0.1);  color: var(--user-color); }
    .trigger-auto    { background: rgba(167,139,250,0.1); color: var(--auto-color); }
    .trigger-system  { background: rgba(148,163,184,0.1); color: var(--system-color); }
    .trigger-unknown { background: rgba(251,191,36,0.1);  color: var(--warning); }

    .action-summary {
      flex: 1;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .action-summary .highlight { color: var(--text); }

    .action-time {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      font-family: var(--mono);
    }

    .expand-icon {
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .action-item.expanded .expand-icon { transform: rotate(90deg); }

    .action-json {
      display: none;
      padding: 0 10px 10px;
    }
    .action-item.expanded .action-json { display: block; }

    .json-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }

    /* JSON syntax highlighting */
    .json-key    { color: #93c5fd; }
    .json-string { color: #86efac; }
    .json-number { color: #fca5a5; }
    .json-bool   { color: #fbbf24; }
    .json-null   { color: var(--text-dim); }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-recording { color: var(--accent); }

    .copied-toast {
      font-size: 11px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .copied-toast.show { opacity: 1; }

    /* ── Console toggle & filter ── */
    .console-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: all 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: var(--accent-dim);
    }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(14px);
      background: var(--accent);
    }

    .console-label {
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .console-filter-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      display: none;
    }
    .console-filter-input.visible { display: block; }
    .console-filter-input:focus { border-color: var(--accent); }
    .console-filter-input::placeholder { color: var(--muted); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-dot stopped" id="logoDot"></div>
      <span>Action Logger</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-clear" id="btnClear" title="Xóa tất cả">🗑 Clear</button>
      <button class="btn btn-copy" id="btnCopy" title="Copy JSON">📋 Copy JSON</button>
      <button class="btn btn-record" id="btnRecord">▶ Start</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-dot" style="background:#60a5fa"></span>
      <span>User</span>
      <span class="stat-value" id="statUser">0</span>
    </div>
    <div class="stat">
      <span class="stat-dot" style="background:#a78bfa"></span>
      <span>Auto</span>
      <span class="stat-value" id="statAuto">0</span>
    </div>
    <div class="stat">
      <span class="stat-dot" style="background:#f472b6"></span>
      <span>Console</span>
      <span class="stat-value" id="statConsole">0</span>
    </div>
    <div class="stat">
      <span class="stat-dot" style="background:#94a3b8"></span>
      <span>Total</span>
      <span class="stat-value" id="statTotal">0</span>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip chip-user" data-filter="user">👤 User</button>
    <button class="filter-chip chip-auto" data-filter="auto">⚡ Auto</button>
    <button class="filter-chip" data-filter="click">Click</button>
    <button class="filter-chip" data-filter="input">Input</button>
    <button class="filter-chip" data-filter="dom_mutation">Mutation</button>
    <button class="filter-chip" data-filter="console">🖥 Console</button>
  </div>

  <!-- CONSOLE TOGGLE & FILTER -->
  <div class="console-bar" id="consoleBar">
    <label class="toggle">
      <input type="checkbox" id="consoleToggle" />
      <span class="toggle-slider"></span>
    </label>
    <span class="console-label">Console capture</span>
    <input type="text" class="console-filter-input" id="consoleFilterInput" placeholder="Filter console logs..." />
  </div>

  <!-- ACTIONS LIST -->
  <div class="actions-container" id="actionsList">
    <div class="empty-state" id="emptyState">
      <div class="icon">⏺</div>
      <div>Nhấn <strong>Start</strong> để bắt đầu ghi lại</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="status-text" id="statusText">⏹ Chưa ghi</div>
    <span class="copied-toast" id="copiedToast">✓ Đã copy!</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
