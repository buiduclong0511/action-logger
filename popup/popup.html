<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Action Logger</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');

    :root {
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    /* ── Light theme (default) ── */
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --surface2: #f1f3f5;
      --border: #e2e5ea;
      --accent: #16a34a;
      --accent-dim: rgba(22, 163, 74, 0.1);
      --danger: #dc2626;
      --danger-dim: rgba(220, 38, 38, 0.1);
      --warning: #d97706;
      --muted: #9ca3af;
      --text: #1e293b;
      --text-dim: #64748b;
      --user-color: #2563eb;
      --auto-color: #7c3aed;
      --system-color: #64748b;

      --badge-click-bg: rgba(37, 99, 235, 0.1);
      --badge-click-fg: #2563eb;
      --badge-input-bg: rgba(22, 163, 74, 0.1);
      --badge-input-fg: #16a34a;
      --badge-keydown-bg: rgba(217, 119, 6, 0.1);
      --badge-keydown-fg: #d97706;
      --badge-scroll-bg: rgba(100, 116, 139, 0.08);
      --badge-scroll-fg: #64748b;
      --badge-dom-bg: rgba(124, 58, 237, 0.1);
      --badge-dom-fg: #7c3aed;
      --badge-navigate-bg: rgba(234, 88, 12, 0.1);
      --badge-navigate-fg: #ea580c;
      --badge-console-bg: rgba(219, 39, 119, 0.1);
      --badge-console-fg: #db2777;
      --badge-recording-bg: rgba(22, 163, 74, 0.08);
      --badge-recording-fg: #16a34a;

      --method-log-bg: rgba(100, 116, 139, 0.1);
      --method-log-fg: #64748b;
      --method-warn-bg: rgba(217, 119, 6, 0.1);
      --method-warn-fg: #d97706;
      --method-error-bg: rgba(220, 38, 38, 0.1);
      --method-error-fg: #dc2626;
      --method-info-bg: rgba(37, 99, 235, 0.1);
      --method-info-fg: #2563eb;
      --method-debug-bg: rgba(124, 58, 237, 0.1);
      --method-debug-fg: #7c3aed;

      --trigger-user-bg: rgba(37, 99, 235, 0.08);
      --trigger-auto-bg: rgba(124, 58, 237, 0.08);
      --trigger-system-bg: rgba(100, 116, 139, 0.08);
      --trigger-unknown-bg: rgba(217, 119, 6, 0.08);

      --chip-user-bg: rgba(37, 99, 235, 0.08);
      --chip-auto-bg: rgba(124, 58, 237, 0.08);

      --json-key: #2563eb;
      --json-string: #16a34a;
      --json-number: #dc2626;
      --json-bool: #d97706;

      --btn-record-hover: rgba(22, 163, 74, 0.2);
      --btn-stop-hover: rgba(220, 38, 38, 0.2);
      --btn-copy-border: rgba(217, 119, 6, 0.3);
      --btn-copy-bg: rgba(217, 119, 6, 0.06);
      --btn-copy-hover: rgba(217, 119, 6, 0.12);
    }

    /* ── Dark theme: system preference OR manual override ── */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0d0f14;
        --surface: #161922;
        --surface2: #1e2330;
        --border: #2a3040;
        --accent: #4ade80;
        --accent-dim: rgba(74, 222, 128, 0.15);
        --danger: #f87171;
        --danger-dim: rgba(248, 113, 113, 0.15);
        --warning: #fbbf24;
        --muted: #4a5568;
        --text: #e2e8f0;
        --text-dim: #64748b;
        --user-color: #60a5fa;
        --auto-color: #a78bfa;
        --system-color: #94a3b8;

        --badge-click-bg: rgba(96, 165, 250, 0.15);
        --badge-click-fg: #60a5fa;
        --badge-input-bg: rgba(74, 222, 128, 0.15);
        --badge-input-fg: #4ade80;
        --badge-keydown-bg: rgba(251, 191, 36, 0.15);
        --badge-keydown-fg: #fbbf24;
        --badge-scroll-bg: rgba(148, 163, 184, 0.1);
        --badge-scroll-fg: #94a3b8;
        --badge-dom-bg: rgba(167, 139, 250, 0.15);
        --badge-dom-fg: #a78bfa;
        --badge-navigate-bg: rgba(251, 146, 60, 0.15);
        --badge-navigate-fg: #fb923c;
        --badge-console-bg: rgba(244, 114, 182, 0.15);
        --badge-console-fg: #f472b6;
        --badge-recording-bg: rgba(74, 222, 128, 0.1);
        --badge-recording-fg: #4ade80;

        --method-log-bg: rgba(148, 163, 184, 0.15);
        --method-log-fg: #94a3b8;
        --method-warn-bg: rgba(251, 191, 36, 0.15);
        --method-warn-fg: #fbbf24;
        --method-error-bg: rgba(248, 113, 113, 0.15);
        --method-error-fg: #f87171;
        --method-info-bg: rgba(96, 165, 250, 0.15);
        --method-info-fg: #60a5fa;
        --method-debug-bg: rgba(167, 139, 250, 0.15);
        --method-debug-fg: #a78bfa;

        --trigger-user-bg: rgba(96, 165, 250, 0.1);
        --trigger-auto-bg: rgba(167, 139, 250, 0.1);
        --trigger-system-bg: rgba(148, 163, 184, 0.1);
        --trigger-unknown-bg: rgba(251, 191, 36, 0.1);

        --chip-user-bg: rgba(96, 165, 250, 0.1);
        --chip-auto-bg: rgba(167, 139, 250, 0.1);

        --json-key: #93c5fd;
        --json-string: #86efac;
        --json-number: #fca5a5;
        --json-bool: #fbbf24;

        --btn-record-hover: rgba(74, 222, 128, 0.25);
        --btn-stop-hover: rgba(248, 113, 113, 0.25);
        --btn-copy-border: rgba(251, 191, 36, 0.3);
        --btn-copy-bg: rgba(251, 191, 36, 0.08);
        --btn-copy-hover: rgba(251, 191, 36, 0.15);
      }
    }

    /* ── Manual dark override ── */
    :root[data-theme="dark"] {
      --bg: #0d0f14;
      --surface: #161922;
      --surface2: #1e2330;
      --border: #2a3040;
      --accent: #4ade80;
      --accent-dim: rgba(74, 222, 128, 0.15);
      --danger: #f87171;
      --danger-dim: rgba(248, 113, 113, 0.15);
      --warning: #fbbf24;
      --muted: #4a5568;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --user-color: #60a5fa;
      --auto-color: #a78bfa;
      --system-color: #94a3b8;

      --badge-click-bg: rgba(96, 165, 250, 0.15);
      --badge-click-fg: #60a5fa;
      --badge-input-bg: rgba(74, 222, 128, 0.15);
      --badge-input-fg: #4ade80;
      --badge-keydown-bg: rgba(251, 191, 36, 0.15);
      --badge-keydown-fg: #fbbf24;
      --badge-scroll-bg: rgba(148, 163, 184, 0.1);
      --badge-scroll-fg: #94a3b8;
      --badge-dom-bg: rgba(167, 139, 250, 0.15);
      --badge-dom-fg: #a78bfa;
      --badge-navigate-bg: rgba(251, 146, 60, 0.15);
      --badge-navigate-fg: #fb923c;
      --badge-console-bg: rgba(244, 114, 182, 0.15);
      --badge-console-fg: #f472b6;
      --badge-recording-bg: rgba(74, 222, 128, 0.1);
      --badge-recording-fg: #4ade80;

      --method-log-bg: rgba(148, 163, 184, 0.15);
      --method-log-fg: #94a3b8;
      --method-warn-bg: rgba(251, 191, 36, 0.15);
      --method-warn-fg: #fbbf24;
      --method-error-bg: rgba(248, 113, 113, 0.15);
      --method-error-fg: #f87171;
      --method-info-bg: rgba(96, 165, 250, 0.15);
      --method-info-fg: #60a5fa;
      --method-debug-bg: rgba(167, 139, 250, 0.15);
      --method-debug-fg: #a78bfa;

      --trigger-user-bg: rgba(96, 165, 250, 0.1);
      --trigger-auto-bg: rgba(167, 139, 250, 0.1);
      --trigger-system-bg: rgba(148, 163, 184, 0.1);
      --trigger-unknown-bg: rgba(251, 191, 36, 0.1);

      --chip-user-bg: rgba(96, 165, 250, 0.1);
      --chip-auto-bg: rgba(167, 139, 250, 0.1);

      --json-key: #93c5fd;
      --json-string: #86efac;
      --json-number: #fca5a5;
      --json-bool: #fbbf24;

      --btn-record-hover: rgba(74, 222, 128, 0.25);
      --btn-stop-hover: rgba(248, 113, 113, 0.25);
      --btn-copy-border: rgba(251, 191, 36, 0.3);
      --btn-copy-bg: rgba(251, 191, 36, 0.08);
      --btn-copy-hover: rgba(251, 191, 36, 0.15);
    }

    /* ── Manual light override ── */
    :root[data-theme="light"] {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --surface2: #f1f3f5;
      --border: #e2e5ea;
      --accent: #16a34a;
      --accent-dim: rgba(22, 163, 74, 0.1);
      --danger: #dc2626;
      --danger-dim: rgba(220, 38, 38, 0.1);
      --warning: #d97706;
      --muted: #9ca3af;
      --text: #1e293b;
      --text-dim: #64748b;
      --user-color: #2563eb;
      --auto-color: #7c3aed;
      --system-color: #64748b;

      --badge-click-bg: rgba(37, 99, 235, 0.1);
      --badge-click-fg: #2563eb;
      --badge-input-bg: rgba(22, 163, 74, 0.1);
      --badge-input-fg: #16a34a;
      --badge-keydown-bg: rgba(217, 119, 6, 0.1);
      --badge-keydown-fg: #d97706;
      --badge-scroll-bg: rgba(100, 116, 139, 0.08);
      --badge-scroll-fg: #64748b;
      --badge-dom-bg: rgba(124, 58, 237, 0.1);
      --badge-dom-fg: #7c3aed;
      --badge-navigate-bg: rgba(234, 88, 12, 0.1);
      --badge-navigate-fg: #ea580c;
      --badge-console-bg: rgba(219, 39, 119, 0.1);
      --badge-console-fg: #db2777;
      --badge-recording-bg: rgba(22, 163, 74, 0.08);
      --badge-recording-fg: #16a34a;

      --method-log-bg: rgba(100, 116, 139, 0.1);
      --method-log-fg: #64748b;
      --method-warn-bg: rgba(217, 119, 6, 0.1);
      --method-warn-fg: #d97706;
      --method-error-bg: rgba(220, 38, 38, 0.1);
      --method-error-fg: #dc2626;
      --method-info-bg: rgba(37, 99, 235, 0.1);
      --method-info-fg: #2563eb;
      --method-debug-bg: rgba(124, 58, 237, 0.1);
      --method-debug-fg: #7c3aed;

      --trigger-user-bg: rgba(37, 99, 235, 0.08);
      --trigger-auto-bg: rgba(124, 58, 237, 0.08);
      --trigger-system-bg: rgba(100, 116, 139, 0.08);
      --trigger-unknown-bg: rgba(217, 119, 6, 0.08);

      --chip-user-bg: rgba(37, 99, 235, 0.08);
      --chip-auto-bg: rgba(124, 58, 237, 0.08);

      --json-key: #2563eb;
      --json-string: #16a34a;
      --json-number: #dc2626;
      --json-bool: #d97706;

      --btn-record-hover: rgba(22, 163, 74, 0.2);
      --btn-stop-hover: rgba(220, 38, 38, 0.2);
      --btn-copy-border: rgba(217, 119, 6, 0.3);
      --btn-copy-bg: rgba(217, 119, 6, 0.06);
      --btn-copy-hover: rgba(217, 119, 6, 0.12);
    }

    /* ── Theme toggle button ── */
    .btn-theme {
      color: var(--text-dim);
      font-size: 14px;
      padding: 5px 8px;
      line-height: 1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 480px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    .logo-dot.stopped {
      background: var(--muted);
      box-shadow: none;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--border); }

    .btn-record {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .btn-record:hover { background: var(--btn-record-hover); }

    .btn-stop {
      border-color: var(--danger);
      background: var(--danger-dim);
      color: var(--danger);
    }
    .btn-stop:hover { background: var(--btn-stop-hover); }

    .btn-clear {
      color: var(--text-dim);
    }

    .btn-copy {
      color: var(--warning);
      border-color: var(--btn-copy-border);
      background: var(--btn-copy-bg);
    }
    .btn-copy:hover { background: var(--btn-copy-hover); }

    .btn-copy-pretty {
      color: var(--warning);
      border-color: var(--btn-copy-border);
      background: var(--btn-copy-bg);
    }
    .btn-copy-pretty:hover { background: var(--btn-copy-hover); }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .stat-value { font-weight: 600; color: var(--text); }
    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-family: var(--sans);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-chip:hover { color: var(--text); border-color: var(--text-dim); }
    .filter-chip.active {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border);
    }
    .filter-chip.chip-user.active { color: var(--user-color); border-color: var(--user-color); background: var(--chip-user-bg); }
    .filter-chip.chip-auto.active { color: var(--auto-color); border-color: var(--auto-color); background: var(--chip-auto-bg); }

    /* ── Actions list ── */
    .actions-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .actions-container::-webkit-scrollbar { width: 4px; }
    .actions-container::-webkit-scrollbar-track { background: transparent; }
    .actions-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 8px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 32px; opacity: 0.4; }

    /* ── Action item ── */
    .action-item {
      margin-bottom: 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .action-item:hover { border-color: var(--text-dim); }

    .action-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      cursor: pointer;
      user-select: none;
    }

    .action-type-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .badge-click    { background: var(--badge-click-bg);  color: var(--badge-click-fg); }
    .badge-input    { background: var(--badge-input-bg);  color: var(--badge-input-fg); }
    .badge-keydown  { background: var(--badge-keydown-bg);  color: var(--badge-keydown-fg); }
    .badge-scroll   { background: var(--badge-scroll-bg);  color: var(--badge-scroll-fg); }
    .badge-dom_mutation { background: var(--badge-dom-bg); color: var(--badge-dom-fg); }
    .badge-navigate { background: var(--badge-navigate-bg);  color: var(--badge-navigate-fg); }
    .badge-console  { background: var(--badge-console-bg); color: var(--badge-console-fg); }
    .badge-recording_started { background: var(--badge-recording-bg); color: var(--badge-recording-fg); }

    /* Console method sub-badges */
    .console-method {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: var(--mono);
      font-weight: 600;
    }
    .method-log   { background: var(--method-log-bg); color: var(--method-log-fg); }
    .method-warn  { background: var(--method-warn-bg);  color: var(--method-warn-fg); }
    .method-error { background: var(--method-error-bg); color: var(--method-error-fg); }
    .method-info  { background: var(--method-info-bg);  color: var(--method-info-fg); }
    .method-debug { background: var(--method-debug-bg); color: var(--method-debug-fg); }

    .trigger-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .trigger-user    { background: var(--trigger-user-bg);  color: var(--user-color); }
    .trigger-auto    { background: var(--trigger-auto-bg); color: var(--auto-color); }
    .trigger-system  { background: var(--trigger-system-bg); color: var(--system-color); }
    .trigger-unknown { background: var(--trigger-unknown-bg);  color: var(--warning); }

    .action-summary {
      flex: 1;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .action-summary .highlight { color: var(--text); }


    .action-count {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
      font-family: var(--mono);
    }

    .expand-icon {
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .action-item.expanded .expand-icon { transform: rotate(90deg); }

    .action-json {
      display: none;
      padding: 0 10px 10px;
    }
    .action-item.expanded .action-json { display: block; }

    .json-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }

    /* JSON syntax highlighting */
    .json-key    { color: var(--json-key); }
    .json-string { color: var(--json-string); }
    .json-number { color: var(--json-number); }
    .json-bool   { color: var(--json-bool); }
    .json-null   { color: var(--text-dim); }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-recording { color: var(--accent); }

    .copied-toast {
      font-size: 11px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .copied-toast.show { opacity: 1; }

    /* ── Console toggle & filter ── */
    .console-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: all 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: var(--accent-dim);
    }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(14px);
      background: var(--accent);
    }

    .console-label {
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .console-filter-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      display: none;
    }
    .console-filter-input.visible { display: block; }
    .console-filter-input:focus { border-color: var(--accent); }
    .console-filter-input::placeholder { color: var(--muted); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-dot stopped" id="logoDot"></div>
      <span>Action Logger</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-theme" id="btnTheme" title="Chuyển theme">🌙</button>
      <button class="btn btn-clear" id="btnClear" title="Xóa tất cả">🗑</button>
      <button class="btn btn-copy" id="btnCopy" title="Copy JSON (compact)">📋</button>
      <button class="btn btn-copy-pretty" id="btnCopyPretty" title="Copy JSON (pretty)">📄</button>
      <button class="btn btn-record" id="btnRecord">▶</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-dot" style="background:#60a5fa"></span>
      <span>User</span>
      <span class="stat-value" id="statUser">0</span>
    </div>
    <div class="stat">
      <span class="stat-dot" style="background:#a78bfa"></span>
      <span>Auto</span>
      <span class="stat-value" id="statAuto">0</span>
    </div>
    <div class="stat">
      <span class="stat-dot" style="background:#f472b6"></span>
      <span>Console</span>
      <span class="stat-value" id="statConsole">0</span>
    </div>
    <div class="stat">
      <span class="stat-dot" style="background:#94a3b8"></span>
      <span>Total</span>
      <span class="stat-value" id="statTotal">0</span>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip chip-user" data-filter="user">👤 User</button>
    <button class="filter-chip chip-auto" data-filter="auto">⚡ Auto</button>
    <button class="filter-chip" data-filter="click">Click</button>
    <button class="filter-chip" data-filter="input">Input</button>
    <button class="filter-chip" data-filter="dom_mutation">Mutation</button>
    <button class="filter-chip" data-filter="console">🖥 Console</button>
  </div>

  <!-- CONSOLE TOGGLE & FILTER -->
  <div class="console-bar" id="consoleBar">
    <label class="toggle">
      <input type="checkbox" id="consoleToggle" />
      <span class="toggle-slider"></span>
    </label>
    <span class="console-label">Console capture</span>
    <input type="text" class="console-filter-input" id="consoleFilterInput" placeholder="Filter console logs..." />
  </div>

  <!-- ACTIONS LIST -->
  <div class="actions-container" id="actionsList">
    <div class="empty-state" id="emptyState">
      <div class="icon">⏺</div>
      <div>Nhấn <strong>Start</strong> để bắt đầu ghi lại</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="status-text" id="statusText">⏹ Chưa ghi</div>
    <span class="copied-toast" id="copiedToast">✓ Đã copy!</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
